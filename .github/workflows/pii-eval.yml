name: PII detection eval (NER)

# Heavy job — installs the ~560 MB spaCy model. Runs the full NER pipeline:
# the tokenizer/recall tests AND the eval harness, then uploads the report.
# Scheduled weekly + on demand; not part of the fast PR CI.

on:
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC
  workflow_dispatch: {}

jobs:
  ner-eval:
    name: NER pipeline + eval harness
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/gateway
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install deps + spaCy model
        run: |
          pip install -r requirements.txt pytest pytest-asyncio
          python -m spacy download en_core_web_lg
      - name: Full gateway suite (incl. NER)
        run: pytest -q -o asyncio_mode=auto
      - name: Run PII eval harness
        run: PYTHONPATH=. python -m eval.run_eval --mode both
      - name: Upload eval report
        uses: actions/upload-artifact@v4
        with:
          name: pii-eval-report
          path: docs/eval/
