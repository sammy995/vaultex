name: Publish to PyPI

# Publishes the `clawwarden` Python package on a version tag (e.g. v0.1.0).
# Uses PyPI Trusted Publishing (OIDC) — NO API token stored. Configure the
# trusted publisher once on PyPI (see below), then push a tag.
#
# PyPI setup (one time, in the PyPI UI):
#   PyPI → your account → Publishing → "Add a pending publisher"
#     PyPI Project Name: clawwarden
#     Owner:             clawwarden
#     Repository name:   clawwarden
#     Workflow name:     pypi-publish.yml
#     Environment name:  pypi
#
# Then bump the version in packages/classifier/pyproject.toml to match the tag
# and run:  git tag v0.1.0 && git push origin v0.1.0

on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  pypi:
    name: Build + publish clawwarden
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # OIDC token for Trusted Publishing — no password needed
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build sdist + wheel
        working-directory: packages/classifier
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/classifier/dist
