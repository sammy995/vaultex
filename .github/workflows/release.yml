name: Release (publish packages)

# Publishes on a version tag (e.g. `git tag v0.1.1 && git push --tags`).
# Requires repo secrets: NPM_TOKEN (npm automation token for the @clawwarden scope)
# and PYPI_API_TOKEN (PyPI project/account token). Until both exist + the npm org
# and PyPI project are created, this workflow is a no-op-by-absence (won't run
# without a tag) and is safe to keep in the repo.

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  npm:
    name: Publish TS packages to npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - run: npm run build
      - name: Publish @clawwarden/*
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          for pkg in packages/finsafe-core packages/integrations sdk/typescript; do
            echo "publishing $pkg"
            npm publish "$pkg" --access public || echo "skip $pkg (already published or not ready)"
          done

  pypi:
    name: Publish classifier to PyPI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - working-directory: packages/classifier
        run: |
          pip install build twine
          python -m build
          twine upload dist/* --non-interactive
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
